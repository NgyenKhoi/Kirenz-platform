x-common-env: &common-env
  JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-local-dev-secret-key-123456}
  KAFKA_BOOTSTRAP_SERVERS: ${DOCKER_KAFKA_BOOTSTRAP_SERVERS:?DOCKER_KAFKA_BOOTSTRAP_SERVERS must be set in .env}
  REDIS_HOST: ${DOCKER_REDIS_HOST:?DOCKER_REDIS_HOST must be set in .env}
  REDIS_PORT: ${DOCKER_REDIS_PORT:?DOCKER_REDIS_PORT must be set in .env}
  REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:?DOCKER_REDIS_PASSWORD must be set in .env}
  EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
  EUREKA_DEFAULT_ZONE: ${DOCKER_EUREKA_DEFAULT_ZONE:-http://discovery-service:8761/eureka/}
  IDENTITY_SERVICE_URL: ${DOCKER_IDENTITY_SERVICE_URL:-http://identity-service:8081}
  USER_SERVICE_URL: ${DOCKER_USER_SERVICE_URL:-http://user-service:8082}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-local}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-local}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-local}
  BREVO_API_KEY: ${BREVO_API_KEY:-local}
  BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-noreply@kirenz.local}
  BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-Kirenz Local}

x-spring-build: &spring-build
  context: .
  dockerfile: spring-service.Dockerfile

services:
  kafka:
    image: apache/kafka:latest
    container_name: kirenz-kafka
    hostname: broker
    ports:
      - "${LOCAL_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:${LOCAL_KAFKA_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: kirenz-local-dev-cluster

  redis:
    image: redis:7.2
    container_name: kirenz-redis
    command: redis-server --requirepass "${DOCKER_REDIS_PASSWORD:?DOCKER_REDIS_PASSWORD must be set in .env}"
    environment:
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:?DOCKER_REDIS_PASSWORD must be set in .env}
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: discovery-service
    container_name: kirenz-discovery-service
    environment:
      SERVER_PORT: 8761
    ports:
      - "${DISCOVERY_SERVICE_PORT:-8761}:8761"

  identity-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: identity-service
    container_name: kirenz-identity-service
    environment:
      <<: *common-env
      DATABASE_USERNAME: ${IDENTITY_DATABASE_USERNAME}
      DATABASE_PASSWORD: ${IDENTITY_DATABASE_PASSWORD}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL}
      IDENTITY_LIQUIBASE_ENABLED: ${IDENTITY_LIQUIBASE_ENABLED:-false}
    ports:
      - "${IDENTITY_SERVICE_PORT:-8081}:8081"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_started

  user-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: user-service
    container_name: kirenz-user-service
    environment:
      <<: *common-env
      DATABASE_USERNAME: ${USER_DATABASE_USERNAME}
      DATABASE_PASSWORD: ${USER_DATABASE_PASSWORD}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      USER_LIQUIBASE_ENABLED: ${USER_LIQUIBASE_ENABLED:-false}
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"
    depends_on:
      kafka:
        condition: service_started
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started

  social-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: social-service
    container_name: kirenz-social-service
    environment:
      <<: *common-env
      MONGODB_URI: ${SOCIAL_MONGODB_URI:?SOCIAL_MONGODB_URI must be set in .env}
    ports:
      - "${SOCIAL_SERVICE_PORT:-8083}:8083"
    depends_on:
      kafka:
        condition: service_started
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      user-service:
        condition: service_started

  chat-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: chat-service
    container_name: kirenz-chat-service
    environment:
      <<: *common-env
      MONGODB_URI: ${CHAT_MONGODB_URI}
    ports:
      - "${CHAT_SERVICE_PORT:-8084}:8084"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      user-service:
        condition: service_started

  notification-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: notification-service
    container_name: kirenz-notification-service
    environment:
      <<: *common-env
      DATABASE_USERNAME: ${NOTIFICATION_DATABASE_USERNAME}
      DATABASE_PASSWORD: ${NOTIFICATION_DATABASE_PASSWORD}
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      NOTIFICATION_LIQUIBASE_ENABLED: ${NOTIFICATION_LIQUIBASE_ENABLED:-false}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:8085"
    depends_on:
      kafka:
        condition: service_started
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      user-service:
        condition: service_started

  admin-service:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: admin-service
    container_name: kirenz-admin-service
    environment:
      <<: *common-env
      ADMIN_DATABASE_USERNAME: ${ADMIN_DATABASE_USERNAME}
      ADMIN_DATABASE_PASSWORD: ${ADMIN_DATABASE_PASSWORD}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL}
      ADMIN_LIQUIBASE_ENABLED: ${ADMIN_LIQUIBASE_ENABLED:-false}
    ports:
      - ${ADMIN_SERVICE_PORT:-8086}:8086
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      user-service:
        condition: service_started

  api-gateway:
    build:
      <<: *spring-build
      args:
        SERVICE_DIR: api-gateway
    container_name: kirenz-api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_ENABLED: ${EUREKA_ENABLED:-true}
      EUREKA_DEFAULT_ZONE: ${DOCKER_EUREKA_DEFAULT_ZONE:-http://discovery-service:8761/eureka/}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${DOCKER_EUREKA_DEFAULT_ZONE:-http://discovery-service:8761/eureka/}
      IDENTITY_SERVICE_URI: ${DOCKER_GATEWAY_IDENTITY_SERVICE_URI:-http://identity-service:8081}
      USER_SERVICE_URI: ${DOCKER_GATEWAY_USER_SERVICE_URI:-http://user-service:8082}
      SOCIAL_SERVICE_URI: ${DOCKER_GATEWAY_SOCIAL_SERVICE_URI:-http://social-service:8083}
      CHAT_SERVICE_URI: ${DOCKER_GATEWAY_CHAT_SERVICE_URI:-http://chat-service:8084}
      NOTIFICATION_SERVICE_URI: ${DOCKER_GATEWAY_NOTIFICATION_SERVICE_URI:-http://notification-service:8085}
      ADMIN_SERVICE_URI: ${DOCKER_GATEWAY_ADMIN_SERVICE_URI:-http://admin-service:8086}
      CHAT_WS_SERVICE_URI: ${DOCKER_GATEWAY_CHAT_WS_SERVICE_URI:-http://chat-service:8084}
      NOTIFICATION_WS_SERVICE_URI: ${DOCKER_GATEWAY_NOTIFICATION_WS_SERVICE_URI:-http://notification-service:8085}
      SERVER_PORT: 8080
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      user-service:
        condition: service_started
      social-service:
        condition: service_started
      chat-service:
        condition: service_started
      notification-service:
        condition: service_started
      admin-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_API_URL: ${VITE_BASE_API_URL:-http://localhost:8080/api}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_USER_SERVICE_BASE_URL: ${VITE_USER_SERVICE_BASE_URL:-http://localhost:8080/api}
        VITE_SOCIAL_SERVICE_BASE_URL: ${VITE_SOCIAL_SERVICE_BASE_URL:-http://localhost:8080/api}
        VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-http://localhost:8080}
        VITE_NOTIFICATION_API_URL: ${VITE_NOTIFICATION_API_URL:-http://localhost:8080}
        VITE_NOTIFICATION_SERVICE_BASE_URL: ${VITE_NOTIFICATION_SERVICE_BASE_URL:-http://localhost:8080/api}
        VITE_CHAT_WS_URL: ${VITE_CHAT_WS_URL:-http://localhost:8080/ws/chat}
        VITE_NOTIFICATION_WS_URL: ${VITE_NOTIFICATION_WS_URL:-http://localhost:8080/ws/notifications}
    container_name: kirenz-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - identity-service
      - user-service
      - social-service
      - chat-service
      - notification-service
      - admin-service
