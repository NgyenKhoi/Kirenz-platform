spring:
  application:
    name: social-service
  data:
    mongodb:
      uri: ${MONGODB_URI}

server:
  port: 8083

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
