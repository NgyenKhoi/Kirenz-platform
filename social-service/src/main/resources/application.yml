spring:
  application:
    name: social-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  data:
    mongodb:
      uri: ${MONGODB_URI}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8083

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8082}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  max-image-bytes: ${CLOUDINARY_MAX_IMAGE_BYTES:10485760}
  max-chat-image-bytes: ${CLOUDINARY_MAX_CHAT_IMAGE_BYTES:52428800}
  max-chat-video-bytes: ${CLOUDINARY_MAX_CHAT_VIDEO_BYTES:524288000}
  folders:
    posts: ${CLOUDINARY_POST_FOLDER:kirenz/posts}
    chat: ${CLOUDINARY_CHAT_FOLDER:kirenz/chat}
