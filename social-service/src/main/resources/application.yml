spring:
  application:
    name: social-service

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  data:
    mongodb:
      uri: ${MONGODB_URI}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8083

+management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-components: always
      show-details: never

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  max-image-bytes: ${CLOUDINARY_MAX_IMAGE_BYTES:10485760}
  max-chat-image-bytes: ${CLOUDINARY_MAX_CHAT_IMAGE_BYTES:52428800}
  max-chat-video-bytes: ${CLOUDINARY_MAX_CHAT_VIDEO_BYTES:524288000}
  folders:
    posts: ${CLOUDINARY_POST_FOLDER:kirenz/posts}
    chat: ${CLOUDINARY_CHAT_FOLDER:kirenz/chat}
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      identity-service:
        base-config: default
      user-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
    instances:
      identity-service:
        base-config: default
      user-service:
        base-config: default
