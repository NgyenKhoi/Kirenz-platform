spring:
  application:
    name: social-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  data:
    mongodb:
      uri: ${MONGODB_URI}

server:
  port: 8083

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8082}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  max-image-bytes: ${CLOUDINARY_MAX_IMAGE_BYTES:10485760}
  folders:
    posts: ${CLOUDINARY_POST_FOLDER:kirenz/posts}
