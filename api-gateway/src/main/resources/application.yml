server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://54.169.121.31:3000"
              - "http://kirenz.online"
              - "https://kirenz.online"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: chat-websocket
          uri: ${CHAT_WS_SERVICE_URI:lb://chat-service}
          predicates:
            - Path=/ws/chat/**
          filters:
            - RewritePath=/ws/chat/?(?<segment>.*), /ws/$\{segment}
        - id: notification-websocket
          uri: ${NOTIFICATION_WS_SERVICE_URI:lb://notification-service}
          predicates:
            - Path=/ws/notifications/**
          filters:
            - RewritePath=/ws/notifications/?(?<segment>.*), /ws/$\{segment}
        - id: user-service-users
          uri: ${USER_SERVICE_URI:lb://user-service}
          predicates:
            - Path=/api/users/search,/api/users/*/mutual-friends
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URI:lb://identity-service}
          predicates:
            - Path=/api/auth/**,/api/verification/**,/api/users/me/**,/api/users/internal/**,/api/users/*
        - id: user-service
          uri: ${USER_SERVICE_URI:lb://user-service}
          predicates:
            - Path=/api/friends/**,/api/blocks/**,/api/privacy/**
        - id: social-service
          uri: ${SOCIAL_SERVICE_URI:lb://social-service}
          predicates:
            - Path=/api/posts/**,/api/comments/**,/api/media/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URI:lb://chat-service}
          predicates:
            - Path=/api/conversations/**,/api/messages/**,/api/presence/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:lb://notification-service}
          predicates:
            - Path=/api/notifications/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URI:lb://admin-service}
          predicates:
            - Path=/api/admin/**,/api/reports/**,/api/moderation/**

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-local-dev-secret-key-123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
